<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>롤링페이퍼 💌</title>
<style>
  :root {
    --bg:#fafaf8;--bg2:#f2f1ee;--bg3:#e8e6e1;
    --card:#ffffff;--text:#1a1a1a;--text2:#6b6b6b;--text3:#a0a0a0;
    --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
    --accent:#1a1a1a;--danger:#d32f2f;--success:#2e7d32;
    --radius:12px;--radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .wrap{max-width:480px;margin:0 auto;padding:2rem 1.25rem 4rem;}
  .screen{display:none;}.screen.active{display:block;}
  h1{font-size:24px;font-weight:700;margin-bottom:4px;}
  h2{font-size:18px;font-weight:600;margin-bottom:4px;}
  .sub{font-size:14px;color:var(--text2);margin-bottom:1.75rem;line-height:1.5;}
  .label{font-size:13px;color:var(--text2);margin-bottom:6px;}
  .card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem;}
  input[type=text],textarea{width:100%;padding:10px 12px;border:0.5px solid var(--border2);border-radius:var(--radius-sm);font-size:15px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;transition:border-color .15s;}
  input[type=text]:focus,textarea:focus{border-color:var(--accent);}
  textarea{resize:none;line-height:1.7;}
  .btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;border:none;transition:opacity .15s,transform .1s;}
  .btn:active{transform:scale(0.98);}.btn:disabled{opacity:0.35;cursor:not-allowed;}
  .btn-primary{background:var(--accent);color:#fff;}.btn-primary:hover:not(:disabled){opacity:0.85;}
  .btn-outline{background:none;border:0.5px solid var(--border2);color:var(--text);padding:9px 14px;width:auto;font-size:14px;font-weight:500;}
  .btn-outline:hover{background:var(--bg2);}
  .btn-ghost{background:none;border:none;color:var(--text2);font-size:13px;padding:6px 10px;width:auto;cursor:pointer;}
  .btn-ghost:hover{color:var(--text);}
  .name-row{display:flex;gap:8px;margin-bottom:8px;}
  .name-row input{flex:1;}
  .name-row .del{width:38px;height:38px;flex-shrink:0;border:0.5px solid var(--border2);border-radius:var(--radius-sm);background:none;cursor:pointer;font-size:16px;color:var(--text2);display:flex;align-items:center;justify-content:center;}
  .name-row .del:hover{background:var(--bg2);}
  .add-btn{display:flex;align-items:center;gap:6px;width:100%;padding:9px 12px;border:0.5px dashed var(--border2);border-radius:var(--radius-sm);background:none;color:var(--text2);font-size:14px;cursor:pointer;margin-bottom:1.25rem;}
  .add-btn:hover{background:var(--bg2);}
  .person-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg);border-radius:var(--radius-sm);margin-bottom:8px;}
  .av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;}
  .av-lg{width:46px;height:46px;font-size:16px;}
  .person-name{font-size:14px;font-weight:500;flex:1;}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .copy-btn{font-size:12px;padding:5px 11px;border:0.5px solid var(--border2);border-radius:20px;background:none;color:var(--text2);cursor:pointer;white-space:nowrap;}
  .copy-btn:hover{background:var(--bg2);}.copy-btn.ok{color:var(--success);border-color:var(--success);}
  .sticker-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1rem;}
  .sk-btn{width:40px;height:40px;font-size:20px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .1s;}
  .sk-btn.on{border:2px solid var(--accent);background:var(--bg2);}
  .color-row{display:flex;gap:8px;margin-bottom:1rem;}
  .cdot{width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
  .cdot.on{outline:3px solid var(--accent);outline-offset:2px;}
  .paper{border-radius:var(--radius-sm);padding:1rem;border:0.5px solid var(--border);margin-bottom:.75rem;}
  .paper textarea{background:transparent;border:none;padding:0;font-size:15px;color:var(--text);}
  .paper textarea:focus{border:none;}
  .sk-display{font-size:26px;min-height:32px;margin-bottom:4px;}
  .progress{height:4px;background:var(--bg3);border-radius:2px;margin-bottom:1.5rem;}
  .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s;}
  .tab-bar{display:flex;gap:4px;padding:4px;background:var(--bg2);border-radius:var(--radius-sm);margin-bottom:1.25rem;overflow-x:auto;}
  .tab{flex-shrink:0;padding:7px 12px;font-size:13px;border:none;background:none;border-radius:6px;cursor:pointer;color:var(--text2);white-space:nowrap;display:flex;align-items:center;gap:5px;}
  .tab.on{background:var(--card);color:var(--text);font-weight:600;border:0.5px solid var(--border);}
  .letter-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:12px;}
  .letter-from{font-size:12px;color:var(--text2);margin-bottom:10px;display:flex;justify-content:space-between;}
  .letter-paper{border-radius:var(--radius-sm);padding:1rem;}
  .letter-sk{font-size:24px;margin-bottom:6px;}
  .letter-text{font-size:15px;line-height:1.75;color:var(--text);}
  .err{font-size:13px;color:var(--danger);margin-bottom:10px;}
  .char-count{font-size:12px;color:var(--text3);text-align:right;margin-bottom:1rem;}
  .divider{border:none;border-top:0.5px solid var(--border);margin:1rem 0;}
  .back-row{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;}
  .empty{text-align:center;padding:3rem 1rem;color:var(--text2);font-size:14px;}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:14px;padding:10px 20px;border-radius:20px;opacity:0;pointer-events:none;transition:opacity .2s;white-space:nowrap;}
  #toast.show{opacity:1;}
</style>
</head>
<body>
<div class="wrap">

<div id="s-home" class="screen active">
  <h1>롤링페이퍼 💌</h1>
  <p class="sub">마지막 날, 서로에게 따뜻한 편지를 남겨요</p>
  <div class="card">
    <div class="label" style="margin-bottom:1rem;">어떻게 시작할까요?</div>
    <button class="btn btn-primary" style="margin-bottom:10px;" onclick="show('s-setup')">✨ 새 롤링페이퍼 만들기</button>
    <button class="btn btn-outline" style="width:100%;" onclick="show('s-join')">🔗 링크로 편지 쓰러 가기</button>
  </div>
</div>

<div id="s-setup" class="screen">
  <div class="back-row">
    <button class="btn btn-outline" onclick="show('s-home')" style="width:auto;padding:8px 12px;">← 뒤로</button>
    <h2>새 롤링페이퍼 만들기</h2>
  </div>
  <div class="card">
    <div class="label">팀원 이름 입력</div>
    <div id="name-list"></div>
    <button class="add-btn" onclick="addName()">＋ 팀원 추가</button>
    <div id="setup-err" class="err" style="display:none;"></div>
    <button class="btn btn-primary" id="setup-btn" onclick="doSetup()">🎲 마니또 뽑고 시작하기</button>
  </div>
</div>

<div id="s-links" class="screen">
  <h2>링크 공유</h2>
  <p class="sub">각자에게 링크를 보내세요. 링크를 열면 누구에게 쓰는지 나타나요.</p>
  <div class="progress"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;">
    <span id="progress-text" style="font-size:13px;color:var(--text2);">0명 작성 완료</span>
    <button class="btn-ghost" onclick="refreshStatus()">↻ 새로고침</button>
  </div>
  <div id="links-list"></div>
  <div class="card" style="margin-top:1rem;">
    <div class="label" style="margin-bottom:.5rem;">방 링크 (단체 공유용)</div>
    <div style="display:flex;gap:8px;">
      <input type="text" id="room-url" readonly style="flex:1;font-size:13px;color:var(--text2);"/>
      <button class="copy-btn" id="copy-room-btn" onclick="copyRoomLink()">복사</button>
    </div>
    <p style="font-size:12px;color:var(--text3);margin-top:8px;">이 링크를 단체 카톡에 공유하면 팀원들이 각자 편지를 써요</p>
  </div>
  <button class="btn btn-primary" style="margin-top:1rem;" onclick="openReveal()">💌 모든 편지 보기 (방장용)</button>
</div>

<div id="s-join" class="screen">
  <div class="back-row">
    <button class="btn btn-outline" onclick="show('s-home')" style="width:auto;padding:8px 12px;">← 뒤로</button>
    <h2>편지 쓰러 가기</h2>
  </div>
  <div class="card">
    <div class="label" style="margin-bottom:.75rem;">받은 링크를 그대로 브라우저에 열면 자동 이동해요.<br>또는 아래에 붙여넣기 해도 돼요.</div>
    <input type="text" id="join-input" placeholder="https://your-app.vercel.app/?room=xxx&writer=이름" style="margin-bottom:10px;"/>
    <div id="join-err" class="err" style="display:none;"></div>
    <button class="btn btn-primary" onclick="doJoin()">편지 쓰러 가기 →</button>
  </div>
</div>

<div id="s-write" class="screen">
  <div class="back-row">
    <button class="btn btn-outline" onclick="show('s-home')" style="width:auto;padding:8px 12px;">← 홈</button>
    <div>
      <h2 id="write-title">편지 쓰기</h2>
      <div style="font-size:12px;color:var(--text2);">마음을 담아 써요</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg2);border-radius:var(--radius);margin-bottom:1.25rem;">
    <div class="av av-lg" id="target-av"></div>
    <div>
      <div style="font-size:16px;font-weight:600;" id="target-name"></div>
      <div style="font-size:13px;color:var(--text2);">이 친구에게 편지를 써요 💛</div>
    </div>
  </div>
  <div class="card">
    <div class="label">스티커 고르기</div>
    <div class="sticker-grid" id="sticker-grid"></div>
    <div class="label">편지지 색깔</div>
    <div class="color-row" id="color-row"></div>
    <div class="divider"></div>
    <div class="paper" id="paper-bg">
      <div class="sk-display" id="sk-display"></div>
      <textarea id="msg" placeholder="따뜻한 말 한마디를 남겨요..." rows="6" maxlength="300" oninput="onMsgInput()"></textarea>
    </div>
    <div class="char-count" id="char-count">0 / 300</div>
    <div id="write-err" class="err" style="display:none;"></div>
    <button class="btn btn-primary" id="send-btn" onclick="sendLetter()">편지 보내기 💌</button>
    <button class="btn btn-outline" style="width:100%;margin-top:8px;" onclick="openMyLetters()">💌 내가 받은 편지 보기</button>
  </div>
</div>

<div id="s-sent" class="screen">
  <div style="text-align:center;padding:4rem 1rem 2rem;">
    <div style="font-size:56px;margin-bottom:1rem;">💌</div>
    <h2 id="sent-title" style="margin-bottom:8px;"></h2>
    <p style="font-size:14px;color:var(--text2);margin-bottom:2rem;" id="sent-sub"></p>
    <button class="btn btn-primary" style="width:auto;margin:0 auto 10px;" onclick="openMyLetters()">💌 내가 받은 편지 보기</button>
    <button class="btn btn-outline" style="width:auto;margin:0 auto;" onclick="show('s-home')">홈으로</button>
  </div>
</div>

<div id="s-reveal" class="screen">
  <div class="back-row">
    <button class="btn btn-outline" onclick="show('s-links')" style="width:auto;padding:8px 12px;">← 뒤로</button>
    <div>
      <h2>편지 모아보기</h2>
      <div style="font-size:12px;color:var(--text2);" id="reveal-sub"></div>
    </div>
  </div>
  <div class="tab-bar" id="reveal-tabs"></div>
  <div id="reveal-body"></div>
</div>

</div>
<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL='https://unpdaglwlgyfeajoqujc.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVucGRhZ2x3bGd5ZmVham9xdWpjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTI5OTYsImV4cCI6MjA5NTQ2ODk5Nn0.pwTDq_J_ef3bL3QtxNMF6nLnOwgGLbAbU99kWVkTGjg';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const COLORS=[{bg:'#FFF5F5',bd:'#FFCDD2'},{bg:'#FFF8E7',bd:'#FFE082'},{bg:'#F0FAF0',bd:'#C8E6C9'},{bg:'#EFF6FF',bd:'#BBDEFB'},{bg:'#F5F0FF',bd:'#E1D5F5'},{bg:'#FFF3E0',bd:'#FFCC80'}];
const STICKERS=['🌸','🌟','☀️','🌈','🎉','💌','🍀','🎀','🫧','🌙','🦋','🌺'];
const AV_BG=['#B5D4F4','#9FE1CB','#F5C4B3','#CECBF6','#FAC775','#F4C0D1','#C0DD97','#F0997B'];
const AV_FG=['#0C447C','#085041','#712B13','#3C3489','#633806','#72243E','#27500A','#993C1D'];

let G={room:null,writer:null,selSticker:'',selColor:0,letters:[]};

async function dbGet(table,params){
  let q=db.from(table).select('*');
  if(params&&params.id)q=q.eq('id',params.id);
  if(params&&params.room_id)q=q.eq('room_id',params.room_id);
  if(params&&params.writer)q=q.eq('writer',params.writer);
  if(params&&params.order)q=q.order(params.order,{ascending:true});
  if(params&&params.select)q=q.select(params.select);
  const {data,error}=await q;
  if(error)throw new Error(error.message);
  return data;
}
async function dbPost(table,body){
  const {data,error}=await db.from(table).insert(body).select();
  if(error)throw new Error(error.message);
  return data;
}

function ini(n){return(n||'').trim().slice(0,2).toUpperCase();}
function aci(n){return Math.abs((G.room?.names||[]).indexOf(n))%AV_BG.length;}
function uid(){return Math.random().toString(36).slice(2,10);}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function toast(msg,dur=2200){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function makePairs(names){let t,tries=0;do{t=shuffle([...names]);tries++;}while(names.some((n,i)=>n===t[i])&&tries<200);const p={};names.forEach((n,i)=>p[n]=t[i]);return p;}

function parseURL(){
  const p=new URLSearchParams(window.location.search);
  const room=p.get('room'),writer=p.get('writer');
  if(room&&writer)loadWriteScreen(room,writer);
}

function buildNameList(){
  const l=document.getElementById('name-list');l.innerHTML='';
  for(let i=0;i<5;i++)addName();
}
function addName(){
  const l=document.getElementById('name-list');
  const d=document.createElement('div');d.className='name-row';
  d.innerHTML=`<input type="text" placeholder="이름 입력"/><button class="del" onclick="this.closest('.name-row').remove()">✕</button>`;
  l.appendChild(d);
}
async function doSetup(){
  const names=[...document.querySelectorAll('#name-list input')].map(i=>i.value.trim()).filter(Boolean);
  const err=document.getElementById('setup-err');
  if(names.length<2){err.textContent='최소 2명이 필요해요.';err.style.display='block';return;}
  if(new Set(names).size!==names.length){err.textContent='중복 이름이 있어요.';err.style.display='block';return;}
  err.style.display='none';
  const btn=document.getElementById('setup-btn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> 생성 중...';
  try{
    const id=uid();
    const pairs=makePairs(names);
    const room=await dbPost('rooms',{id,names,pairs});
    G.room=room[0];
    renderLinksScreen();
    show('s-links');
  }catch(e){err.textContent='오류가 발생했어요. 다시 시도해주세요.';err.style.display='block';console.error(e);}
  finally{btn.disabled=false;btn.textContent='🎲 마니또 뽑고 시작하기';}
}

function renderLinksScreen(){
  const r=G.room;
  const base=window.location.origin+window.location.pathname;
  document.getElementById('room-url').value=`${base}?room=${r.id}`;
  const ll=document.getElementById('links-list');ll.innerHTML='';
  r.names.forEach(name=>{
    const ci=aci(name);
    const writeUrl=`${base}?room=${r.id}&writer=${encodeURIComponent(name)}`;
    const row=document.createElement('div');row.className='person-row';
    row.innerHTML=`<div class="av" style="background:${AV_BG[ci]};color:${AV_FG[ci]};">${ini(name)}</div><span class="person-name">${name}</span><div class="dot" id="dot-${name}" style="background:#ddd;"></div><button class="copy-btn" onclick="copyLink(this,'${writeUrl}')">링크 복사</button>`;
    ll.appendChild(row);
  });
  refreshStatus();
}

async function refreshStatus(){
  if(!G.room)return;
  try{
    const letters=await dbGet('letters',{room_id:G.room.id,select:'writer'});
    const writers=new Set(letters.map(l=>l.writer));
    const done=writers.size,total=G.room.names.length;
    document.getElementById('progress-fill').style.width=Math.round(done/total*100)+'%';
    document.getElementById('progress-text').textContent=`${done}/${total}명 작성 완료`;
    G.room.names.forEach(name=>{
      const dot=document.getElementById('dot-'+name);
      if(dot)dot.style.background=writers.has(name)?'#4CAF50':'#ddd';
    });
  }catch(e){console.error(e);}
}

function copyLink(btn,url){
  navigator.clipboard.writeText(url).catch(()=>{});
  btn.classList.add('ok');btn.textContent='✓ 복사됨';
  setTimeout(()=>{btn.classList.remove('ok');btn.textContent='링크 복사';},2000);
}
function copyRoomLink(){
  const url=document.getElementById('room-url').value;
  navigator.clipboard.writeText(url).catch(()=>{});
  const btn=document.getElementById('copy-room-btn');
  btn.classList.add('ok');btn.textContent='✓ 복사됨';
  setTimeout(()=>{btn.classList.remove('ok');btn.textContent='복사';},2000);
}

function doJoin(){
  const val=document.getElementById('join-input').value.trim();
  const err=document.getElementById('join-err');
  try{
    const url=new URL(val);
    const room=url.searchParams.get('room'),writer=url.searchParams.get('writer');
    if(!room||!writer){err.textContent='올바른 링크가 아니에요.';err.style.display='block';return;}
    err.style.display='none';loadWriteScreen(room,writer);
  }catch(e){err.textContent='올바른 링크를 입력해주세요.';err.style.display='block';}
}

async function loadWriteScreen(roomId,writerName){
  try{
    const rooms=await dbGet('rooms',{id:roomId});
    if(!rooms.length){toast('방을 찾을 수 없어요.');return;}
    G.room=rooms[0];G.writer=writerName;
    const target=G.room.pairs[writerName];
    if(!target){toast('이름을 찾을 수 없어요.');return;}
    const ci=aci(target);
    document.getElementById('write-title').textContent=writerName+'의 편지';
    document.getElementById('target-name').textContent=target;
    const av=document.getElementById('target-av');
    av.textContent=ini(target);av.style.background=AV_BG[ci];av.style.color=AV_FG[ci];
    const existing=await dbGet('letters',{room_id:roomId,writer:writerName});
    if(existing.length){const l=existing[0];document.getElementById('msg').value=l.content;G.selSticker=l.sticker||'';G.selColor=l.color||0;}
    else{document.getElementById('msg').value='';G.selSticker='';G.selColor=0;}
    renderStickers();renderColorDots();updatePaper();onMsgInput();
    show('s-write');
  }catch(e){toast('오류가 발생했어요.');console.error(e);}
}

function renderStickers(){
  const g=document.getElementById('sticker-grid');g.innerHTML='';
  STICKERS.forEach(s=>{
    const b=document.createElement('button');b.className='sk-btn'+(s===G.selSticker?' on':'');
    b.textContent=s;b.onclick=()=>{G.selSticker=G.selSticker===s?'':s;renderStickers();updatePaper();};
    g.appendChild(b);
  });
}
function renderColorDots(){
  const r=document.getElementById('color-row');r.innerHTML='';
  COLORS.forEach((c,i)=>{
    const d=document.createElement('div');d.className='cdot'+(i===G.selColor?' on':'');
    d.style.cssText=`background:${c.bg};border:2px solid ${c.bd};`;
    d.onclick=()=>{G.selColor=i;renderColorDots();updatePaper();};
    r.appendChild(d);
  });
}
function updatePaper(){
  const c=COLORS[G.selColor];
  const p=document.getElementById('paper-bg');
  p.style.background=c.bg;p.style.borderColor=c.bd;
  document.getElementById('sk-display').textContent=G.selSticker;
}
function onMsgInput(){
  document.getElementById('char-count').textContent=document.getElementById('msg').value.length+' / 300';
}

async function sendLetter(){
  const text=document.getElementById('msg').value.trim();
  const err=document.getElementById('write-err');
  if(!text){err.textContent='내용을 입력해주세요.';err.style.display='block';return;}
  err.style.display='none';
  const btn=document.getElementById('send-btn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> 보내는 중...';
  try{
    const target=G.room.pairs[G.writer];
    await dbPost('letters',{room_id:G.room.id,writer:G.writer,recipient:target,content:text,sticker:G.selSticker,color:G.selColor});
    document.getElementById('sent-title').textContent=target+'에게 편지를 전달했어요! 💌';
    document.getElementById('sent-sub').textContent='소중한 마음이 잘 전달될 거예요';
    show('s-sent');
  }catch(e){err.textContent='저장 중 오류가 발생했어요. 다시 시도해주세요.';err.style.display='block';console.error(e);}
  finally{btn.disabled=false;btn.textContent='편지 보내기 💌';}
}

async function openMyLetters(){
  if(!G.room||!G.writer)return;
  try{
    G.letters=await dbGet('letters',{room_id:G.room.id,order:'created_at'});
    const myName=G.writer;
    const myLetters=G.letters.filter(l=>l.recipient===myName);
    document.getElementById('reveal-title').textContent='내가 받은 편지';
    document.getElementById('reveal-sub').textContent=myLetters.length?`${myLetters.length}통의 편지가 왔어요`:'아직 편지가 없어요';
    document.getElementById('reveal-tabs').style.display='none';
    G.revealMode='mine';
    renderRevealBody(myName);
    show('s-reveal');
  }catch(e){toast('편지를 불러오지 못했어요.');console.error(e);}
}

async function openReveal(){
  if(!G.room)return;
  try{
    G.letters=await dbGet('letters',{room_id:G.room.id,order:'created_at'});
    const done=new Set(G.letters.map(l=>l.writer)).size;
    document.getElementById('reveal-title').textContent='편지 모아보기';
    document.getElementById('reveal-sub').textContent=`${done}/${G.room.names.length}명 작성 완료`;
    document.getElementById('reveal-tabs').style.display='flex';
    G.revealMode='all';
    renderRevealTabs();
    show('s-reveal');
  }catch(e){toast('편지를 불러오지 못했어요.');console.error(e);}
}

function revealGoBack(){
  if(G.revealMode==='mine') show('s-sent');
  else show('s-links');
}

function renderRevealTabs(){
  const tabs=document.getElementById('reveal-tabs');tabs.innerHTML='';
  G.room.names.forEach((name,i)=>{
    const hasLetter=G.letters.some(l=>l.recipient===name);
    const btn=document.createElement('button');btn.className='tab'+(i===0?' on':'');
    btn.innerHTML=`${name}${hasLetter?'<span style="width:6px;height:6px;border-radius:50%;background:#4CAF50;display:inline-block;"></span>':''}`;
    btn.onclick=()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));btn.classList.add('on');renderRevealBody(name);};
    tabs.appendChild(btn);
  });
  if(G.room.names.length)renderRevealBody(G.room.names[0]);
}

function renderRevealBody(recipient){
  const body=document.getElementById('reveal-body');
  const letters=G.letters.filter(l=>l.recipient===recipient);
  const ci=aci(recipient);
  if(!letters.length){body.innerHTML=`<div class="empty">✉️<br>아직 편지가 없어요</div>`;return;}
  let html=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;"><div class="av av-lg" style="background:${AV_BG[ci]};color:${AV_FG[ci]};">${ini(recipient)}</div><div><div style="font-size:16px;font-weight:600;">${recipient}에게 온 편지</div><div style="font-size:13px;color:var(--text2);">${letters.length}통</div></div></div>`;
  letters.forEach(l=>{
    const c=COLORS[l.color||0];
    const ts=l.created_at?new Date(l.created_at).toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
    const safe=l.content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>');
    html+=`<div class="letter-card"><div class="letter-from"><span>✏️ ${l.writer}이(가) 썼어요</span><span style="color:var(--text3);font-size:11px;">${ts}</span></div><div class="letter-paper" style="background:${c.bg};border:0.5px solid ${c.bd};">${l.sticker?`<div class="letter-sk">${l.sticker}</div>`:''}<div class="letter-text">${safe}</div></div></div>`;
  });
  body.innerHTML=html;
}

buildNameList();
parseURL();
</script>
</body>
</html>
